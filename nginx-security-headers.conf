# Shared security headers for RNLT Labs (RNLT-31).
# Included in BOTH the server block and the static-asset location block,
# because nginx `add_header` does NOT inherit into a location that defines
# its own `add_header` directives. Keeping them in one snippet avoids the
# drift where static assets silently lost CSP / Permissions-Policy / HSTS.

# Prevent clickjacking - don't allow site to be embedded in iframes
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enable XSS protection in older browsers
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# HSTS is intentionally NOT set here. This container only listens on plain
# HTTP on localhost:3000 behind the host nginx, which terminates TLS and is
# the correct place for Strict-Transport-Security (set there to avoid a
# duplicate header).

# Content Security Policy (STRICT)
# Allows: self-hosted content, analytics.rnltlabs.de, errors.rnltlabs.de, api.web3forms.com (contact form)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.rnltlabs.de https://errors.rnltlabs.de 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://analytics.rnltlabs.de https://errors.rnltlabs.de https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
