server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ====================================
    # SECURITY HEADERS (RNLT-31)
    # Single source of truth: snippets/security-headers.conf
    # ====================================
    include /etc/nginx/snippets/security-headers.conf;

    # Hide nginx version number
    server_tokens off;

    # SPA routing. `$uri.html` serves pre-rendered flat files (e.g. imprint.html)
    # at the slash-less URL without a 301, then SPA fallback to index.html.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets. nginx `add_header` does NOT inherit once a location
    # defines its own, so the Cache-Control below would otherwise drop all
    # security headers on assets. Re-include the snippet to keep them.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
        # Single Cache-Control (avoid the duplicate that `expires` + add_header produced)
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        include /etc/nginx/snippets/security-headers.conf;
    }
}
